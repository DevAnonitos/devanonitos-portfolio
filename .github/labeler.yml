# PR label rules for stable prod/dev pipeline triage

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - '**/*.mdc'
          - '**/*.mdx'
          - 'docs/**'
          - 'README*'
          - 'CHANGELOG*'
          - 'CONTRIBUTING*'

styles:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.css'
          - '**/*.scss'
          - '**/*.sass'
          - '**/*.module.css'

ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'components/**'
          - 'public/**'

app-router:
  - changed-files:
      - any-glob-to-any-file:
          - 'app/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'scripts/**'

test:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.*'
          - '**/*.spec.*'
          - '**/__tests__/**'
          - 'jest.config.*'
          - 'jest.setup.*'

config:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.json'
          - '**/*.yaml'
          - '**/*.yml'
          - '*.config.*'
          - 'tsconfig.*'
          - '.env*'

deps:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'
          - 'yarn.lock'
          - 'pnpm-lock.yaml'
          - '.github/dependabot.yml'
          - '.github/renovate.json'

prod:
  - base-branch: ['^main$']

dev:
  - base-branch: ['^(develop|dev)$']

feature:
  - head-branch: ['^(feature|feat)/.+']

bug:
  - head-branch: ['^(fix|bugfix)/.+']

hotfix:
  - head-branch: ['^hotfix/.+']

chore:
  - head-branch: ['^chore/.+']

release:
  - all:
      - base-branch: ['^main$']
      - head-branch: ['^release/.+']

wip:
  - head-branch: ['^(wip|draft)/.+']
