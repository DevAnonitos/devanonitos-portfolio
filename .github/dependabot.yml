version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 15
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1
    versioning-strategy: increase-if-necessary
    rebase-strategy: auto
    labels:
      - dependencies
      - npm
      - automerge-candidate
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      production-dependencies:
        applies-to: version-updates
        dependency-type: production
        patterns:
          - "*"
      development-tooling:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"
      security-hotfix:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
      - github-actions
      - ci
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
